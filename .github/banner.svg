<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="Instituto Nefrance — terminal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C1A17"/>
      <stop offset="1" stop-color="#0E0D0B"/>
    </linearGradient>
    <linearGradient id="grain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F3A3D" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#C97F5A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8B9D83" stop-opacity="0.12"/>
    </linearGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", monospace; font-size: 15px; fill: #FAF8F4; }
      .dim  { fill: #A8A39A; }
      .ok   { fill: #8B9D83; }
      .warn { fill: #C97F5A; }
      .accent { fill: #C97F5A; }
      .display { font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-weight: 600; letter-spacing: -0.03em; fill: #FAF8F4; }
    ]]></style>
  </defs>

  <!-- Terminal plate -->
  <rect x="0" y="0" width="900" height="320" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="320" rx="20" fill="url(#grain)" opacity="0.5"/>
  <rect x="0" y="0" width="900" height="320" rx="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Window chrome dots -->
  <circle cx="26" cy="26" r="6" fill="#C97F5A"/>
  <circle cx="46" cy="26" r="6" fill="#D4C9B5"/>
  <circle cx="66" cy="26" r="6" fill="#8B9D83"/>
  <text x="450" y="30" class="mono dim" font-size="11" text-anchor="middle" letter-spacing="0.18em">~/nefrance-site · main</text>

  <!-- Hairline -->
  <line x1="0" y1="56" x2="900" y2="56" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ====== Terminal lines (typing illusion via opacity + clip) ====== -->
  <g class="mono">
    <!-- Line 1 -->
    <g opacity="0">
      <text x="32" y="92"><tspan class="accent">$</tspan> npm run dev</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.1s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="32" y="118" class="dim">▲ Next.js 14.2.35 · ready in 1.7s</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.1s" fill="freeze"/>
    </g>

    <!-- Line 2 -->
    <g opacity="0">
      <text x="32" y="158"><tspan class="accent">$</tspan> grep -r "sem dor" ./app</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.1s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="32" y="184" class="ok">app/page.tsx:55: Aprender sem dor existe.</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.1s" fill="freeze"/>
    </g>

    <!-- Line 3 -->
    <g opacity="0">
      <text x="32" y="224"><tspan class="accent">$</tspan> npm run build</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.1s" fill="freeze"/>
    </g>

    <g opacity="0">
      <text x="32" y="250" class="ok">✓ 6 static pages · 150 kB first load · production ready</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.1s" fill="freeze"/>
    </g>

    <!-- Caret prompt (always blinking) -->
    <g>
      <text x="32" y="290"><tspan class="accent">$</tspan>&#160;</text>
      <rect x="50" y="278" width="8" height="14" fill="#FAF8F4">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Wordmark badge top-right · "nefrance" só (texto curto cabe na pílula) -->
  <g transform="translate(770, 24)">
    <rect x="0" y="0" width="110" height="34" rx="17" fill="rgba(31,58,61,0.4)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="18" cy="17" r="4" fill="#8B9D83"/>
    <text x="30" y="22" class="mono" font-size="11" letter-spacing="0.18em" fill="#A8A39A">NEFRANCE</text>
  </g>
</svg>
